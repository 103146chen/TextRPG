<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="50%" stop-color="#6b7588"/>
      <stop offset="100%" stop-color="#8a95a8"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2420"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
    <linearGradient id="building1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3228"/>
      <stop offset="100%" stop-color="#2a2420"/>
    </linearGradient>
    <linearGradient id="window-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a060" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#a87040" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>

  <!-- 天空 -->
  <rect width="1600" height="600" fill="url(#sky)"/>

  <!-- 遠處建築群（剪影） -->
  <rect x="0" y="300" width="280" height="300" fill="#3a4258" opacity="0.6"/>
  <rect x="260" y="280" width="220" height="320" fill="#353c50" opacity="0.7"/>
  <rect x="460" y="320" width="180" height="280" fill="#2a3044" opacity="0.8"/>
  <rect x="620" y="260" width="240" height="340" fill="#3a4258" opacity="0.6"/>
  <rect x="840" y="290" width="200" height="310" fill="#303848" opacity="0.75"/>
  <rect x="1020" y="310" width="220" height="290" fill="#353c50" opacity="0.7"/>
  <rect x="1220" y="270" width="260" height="330" fill="#2a3044" opacity="0.8"/>
  <rect x="1460" y="300" width="140" height="300" fill="#3a4258" opacity="0.6"/>

  <!-- 騎樓柱（左側） -->
  <rect x="40" y="300" width="50" height="500" fill="url(#building1)"/>
  <rect x="40" y="300" width="50" height="15" fill="#1a140e"/>

  <!-- 騎樓頂 -->
  <rect x="0" y="280" width="320" height="30" fill="#1a140e"/>
  <rect x="0" y="285" width="320" height="5" fill="#2a241e"/>

  <!-- 騎樓內部（較暗） -->
  <rect x="0" y="310" width="320" height="290" fill="#1a1612" opacity="0.9"/>
  <rect x="110" y="320" width="180" height="280" fill="#0a0805"/>

  <!-- 對街書店（透過雨霧） -->
  <g opacity="0.85">
    <rect x="980" y="380" width="280" height="220" fill="#3a2818"/>
    <rect x="980" y="370" width="280" height="15" fill="#2a1808"/>
    <!-- 書店櫥窗 -->
    <rect x="1010" y="420" width="110" height="150" fill="url(#window-glow)"/>
    <rect x="1140" y="420" width="90" height="150" fill="url(#window-glow)"/>
    <!-- 門 -->
    <rect x="1120" y="460" width="25" height="140" fill="#4a3020"/>
    <!-- 招牌 -->
    <rect x="1000" y="395" width="240" height="22" fill="#5a3828"/>
    <text x="1120" y="411" font-family="serif" font-size="16" fill="#d4a060" text-anchor="middle" letter-spacing="4">舊書店</text>
  </g>

  <!-- 地面（濕潤反光） -->
  <rect y="600" width="1600" height="300" fill="url(#ground)"/>
  <rect y="600" width="1600" height="2" fill="#5a5048"/>

  <!-- 地面積水反射 -->
  <ellipse cx="400" cy="780" rx="180" ry="15" fill="#6b7588" opacity="0.15"/>
  <ellipse cx="900" cy="820" rx="250" ry="18" fill="#4a5568" opacity="0.12"/>
  <ellipse cx="1300" cy="800" rx="200" ry="15" fill="#6b7588" opacity="0.1"/>

  <!-- 雨絲 -->
  <g stroke="#a8b0c0" stroke-width="0.8" opacity="0.4">
    <line x1="100" y1="0" x2="85" y2="60"/>
    <line x1="180" y1="20" x2="165" y2="80"/>
    <line x1="260" y1="0" x2="245" y2="60"/>
    <line x1="340" y1="30" x2="325" y2="90"/>
    <line x1="420" y1="10" x2="405" y2="70"/>
    <line x1="500" y1="40" x2="485" y2="100"/>
    <line x1="580" y1="0" x2="565" y2="60"/>
    <line x1="660" y1="20" x2="645" y2="80"/>
    <line x1="740" y1="50" x2="725" y2="110"/>
    <line x1="820" y1="10" x2="805" y2="70"/>
    <line x1="900" y1="30" x2="885" y2="90"/>
    <line x1="980" y1="0" x2="965" y2="60"/>
    <line x1="1060" y1="40" x2="1045" y2="100"/>
    <line x1="1140" y1="20" x2="1125" y2="80"/>
    <line x1="1220" y1="0" x2="1205" y2="60"/>
    <line x1="1300" y1="30" x2="1285" y2="90"/>
    <line x1="1380" y1="10" x2="1365" y2="70"/>
    <line x1="1460" y1="40" x2="1445" y2="100"/>
    <line x1="1540" y1="0" x2="1525" y2="60"/>

    <line x1="130" y1="150" x2="115" y2="210"/>
    <line x1="210" y1="170" x2="195" y2="230"/>
    <line x1="290" y1="150" x2="275" y2="210"/>
    <line x1="370" y1="190" x2="355" y2="250"/>
    <line x1="450" y1="160" x2="435" y2="220"/>
    <line x1="530" y1="200" x2="515" y2="260"/>
    <line x1="610" y1="150" x2="595" y2="210"/>
    <line x1="690" y1="180" x2="675" y2="240"/>
    <line x1="770" y1="200" x2="755" y2="260"/>
    <line x1="850" y1="170" x2="835" y2="230"/>
    <line x1="930" y1="190" x2="915" y2="250"/>
    <line x1="1010" y1="150" x2="995" y2="210"/>
    <line x1="1090" y1="200" x2="1075" y2="260"/>
    <line x1="1170" y1="170" x2="1155" y2="230"/>
    <line x1="1250" y1="150" x2="1235" y2="210"/>
    <line x1="1330" y1="180" x2="1315" y2="240"/>
    <line x1="1410" y1="160" x2="1395" y2="220"/>
    <line x1="1490" y1="200" x2="1475" y2="260"/>

    <line x1="80" y1="350" x2="65" y2="410"/>
    <line x1="240" y1="320" x2="225" y2="380"/>
    <line x1="400" y1="360" x2="385" y2="420"/>
    <line x1="550" y1="340" x2="535" y2="400"/>
    <line x1="700" y1="380" x2="685" y2="440"/>
    <line x1="900" y1="320" x2="885" y2="380"/>
    <line x1="1100" y1="360" x2="1085" y2="420"/>
    <line x1="1250" y1="340" x2="1235" y2="400"/>
    <line x1="1450" y1="380" x2="1435" y2="440"/>

    <line x1="150" y1="550" x2="135" y2="610"/>
    <line x1="350" y1="520" x2="335" y2="580"/>
    <line x1="550" y1="560" x2="535" y2="620"/>
    <line x1="750" y1="540" x2="735" y2="600"/>
    <line x1="950" y1="580" x2="935" y2="640"/>
    <line x1="1150" y1="520" x2="1135" y2="580"/>
    <line x1="1350" y1="560" x2="1335" y2="620"/>
  </g>

  <!-- 遠處雨霧 -->
  <rect width="1600" height="900" fill="#ffffff" opacity="0.08"/>

  <!-- 近處景深 -->
  <rect width="1600" height="900" fill="url(#ground)" opacity="0.15"/>
</svg>
