<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%" height="100%" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="esky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2040"/>
      <stop offset="40%" stop-color="#4a3050"/>
      <stop offset="70%" stop-color="#7a4858"/>
      <stop offset="100%" stop-color="#a85858"/>
    </linearGradient>
    <linearGradient id="eground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1820"/>
      <stop offset="100%" stop-color="#0a0408"/>
    </linearGradient>
    <radialGradient id="streetlamp" cx="0.5" cy="0" r="0.5">
      <stop offset="0%" stop-color="#ffd090" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffd090" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="600" fill="url(#esky)"/>

  <!-- 遠處建築（傍晚剪影，有燈光） -->
